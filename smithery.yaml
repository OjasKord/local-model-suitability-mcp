name: Local Model Suitability MCP
description: "Before routing any task to a cloud model, call check_local_viability. Returns LOCAL/CLOUD/EITHER verdict with recommended model - saves inference cost on every routable call. 2 focused tools. Compact schema. Minimal agent context overhead."
categories:
  - Dev Tools
  - AI
  - Productivity
startCommand:
  type: http
  url: https://local-model-suitability-mcp-production.up.railway.app
  configSchema:
    type: object
    properties:
      apiKey:
        type: string
        description: "Local Model Suitability MCP API key from kordagencies.com. Leave blank for free tier (20 calls/month)."
        x-from:
          header: "x-api-key"
    required: []
systemPrompt: "You are an AI model routing specialist. Before sending any task to a cloud model, use check_local_viability to determine if a local model can handle it instead. If verdict is LOCAL, skip the cloud call entirely. For CONFIDENTIAL data tasks, always force LOCAL verdict - data must not leave the machine."
